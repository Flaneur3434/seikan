[pytest]
# VeriGuard Integration Test Configuration
testpaths = tests/integration
python_files = pytest_*.py
python_functions = test_*

# Enable ESP-IDF embedded services for flashing and IdfDut
addopts = --embedded-services esp,idf -s

# Markers
markers =
    esp32c6: Tests requiring ESP32-C6 hardware
    generic: Generic test environment
    slow: Long-running timer tests (120-200 seconds each)

# Logging
log_cli = true
log_cli_level = INFO
